<div class="image-actions">
  <button
    type="button"
    class="action-btn like"
    [class.like--active]="isLiked()"
    [attr.aria-pressed]="isLiked()"
    [attr.aria-label]="(isLiked() ? 'Unlike' : 'Like') + ' this photo'"
    (click)="onLikeClick()"
    title="Like"
  >
    <span class="icon">♥</span>
  </button>

  <a
    class="action-btn download"
    [href]="image.downloadSrc"
    [download]="downloadFileName"
    [attr.aria-label]="'Download this photo'"
    title="Download"
  >
    <span class="icon">⬇</span>
  </a>

  <button
    type="button"
    class="action-btn share"
    [attr.aria-label]="'Share this photo'"
    (click)="onShareClick()"
    title="Share"
  >
    <svg class="share-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="18" cy="5" r="3"></circle>
      <circle cx="6" cy="12" r="3"></circle>
      <circle cx="18" cy="19" r="3"></circle>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
      <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
    </svg>
  </button>
</div>
